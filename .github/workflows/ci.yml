name: CI

# Phase 3: Ubuntu + macOS + Windows matrix.  Phases 1 (Ubuntu) and 2
# (macOS) both passed cleanly.  Windows is the final platform — this
# expansion exercises:
#   * Chocolatey-installed ffmpeg/tesseract (no apt, no Homebrew).
#   * fontconfig DELIBERATELY ABSENT — `loom_core/fonts.py` should hit
#     its "fontconfig unavailable" graceful-degradation path and the
#     test suite should still pass.
#   * Playwright browser cache path under ~\AppData\Local\ms-playwright.
#   * CRLF line endings in any tests that compare file contents.
#   * Windows path separators (\ vs /) in subprocess + os.path code.

on:
  push:
    branches: [main, monorepo-restructure]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false  # one OS failing shouldn't cancel the others
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10']
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # ─── Platform-specific binary deps ─────────────────────────────────
      - name: System deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg fontconfig tesseract-ocr \
            fonts-noto-core fonts-noto-extra \
            fonts-noto-cjk fonts-noto-cjk-extra

      - name: System deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg tesseract fontconfig
          brew install --cask font-noto-sans-cjk || true

      - name: System deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y ffmpeg tesseract
          # Intentionally NOT installing fontconfig — we want fc-match
          # absent on Windows CI to exercise the "fontconfig unavailable"
          # graceful-degradation path in loom_core/fonts.py.

      # ─── Python deps ───────────────────────────────────────────────────
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # ─── Playwright + Chromium (cached — ~150MB per platform) ──────────
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
            ~\AppData\Local\ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      # ─── Run the suite ─────────────────────────────────────────────────
      - name: pytest
        run: pytest tests/ -v --tb=short

      # ─── Font-validator observability ──────────────────────────────────
      # Prints validate_font() output for a handful of languages.  Runs
      # even on test failure so the CI log always shows cross-platform
      # font coverage differences at a glance — critical for the R6b /
      # 3c bundling decision.
      - name: Font-validator self-check
        if: always()
        env:
          PYTHONPATH: ${{ github.workspace }}
        shell: python
        run: |
          from loom_core.fonts import validate_font
          import json
          for lang, font in [('ja', 'Noto Sans CJK JP'),
                             ('ar', 'Noto Naskh Arabic'),
                             ('he', 'Noto Sans Hebrew'),
                             ('ta', 'Noto Sans Tamil'),
                             ('hi', 'Noto Sans Devanagari'),
                             ('ur', 'Noto Nastaliq Urdu')]:
              r = validate_font(font, lang_code=lang)
              print(f"{lang:4s} {font:30s} {json.dumps(r.__dict__, default=str)}")
