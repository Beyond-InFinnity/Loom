name: CI

# Cross-platform matrix: Ubuntu + macOS + Windows.  After the
# fontconfig drop (loom_core/fonts.py is fontTools-only now) every
# platform takes the same code path through the font validator —
# Windows no longer needs the "fontconfig unavailable" graceful
# degradation that earlier phases of CI exercised.
#
# Each platform installs system binaries through its native package
# manager (apt / brew / choco) and the rest is pip + Playwright.

on:
  push:
    branches: [main, monorepo-restructure]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false  # one OS failing shouldn't cancel the others
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10']
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # ─── Platform-specific binary deps ─────────────────────────────────
      - name: System deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg tesseract-ocr \
            fonts-noto-core fonts-noto-extra \
            fonts-noto-cjk fonts-noto-cjk-extra

      - name: System deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg tesseract
          brew install --cask font-noto-sans-cjk || true

      - name: System deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y ffmpeg tesseract

      # ─── Python deps ───────────────────────────────────────────────────
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # ─── Playwright + Chromium (cached — ~150MB per platform) ──────────
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
            ~\AppData\Local\ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      # ─── Run the suite ─────────────────────────────────────────────────
      - name: pytest
        run: pytest tests/ -v --tb=short

      # ─── Font-validator observability ──────────────────────────────────
      # Prints validate_font() output for a handful of languages.  Runs
      # even on test failure so the CI log always shows cross-platform
      # font coverage at a glance.  Now that the validator is fontTools-
      # backed, "is_fallback: true" entries on macOS/Windows for fonts
      # that aren't pre-installed by brew/choco are the headline signal
      # for what 3c needs to bundle in the Tauri resource directory.
      - name: Font-validator self-check
        if: always()
        env:
          PYTHONPATH: ${{ github.workspace }}
        shell: python
        run: |
          from loom_core.fonts import validate_font, get_default_scanner
          import json
          scanner = get_default_scanner()
          print(f"Scanned dirs: {[str(d) for d in scanner.directories()]}")
          print(f"Indexed faces: {len(scanner)}")
          for lang, font in [('ja', 'Noto Sans CJK JP'),
                             ('ar', 'Noto Naskh Arabic'),
                             ('he', 'Noto Sans Hebrew'),
                             ('ta', 'Noto Sans Tamil'),
                             ('hi', 'Noto Sans Devanagari'),
                             ('ur', 'Noto Nastaliq Urdu')]:
              r = validate_font(font, lang_code=lang)
              print(f"{lang:4s} {font:30s} {json.dumps(r.__dict__, default=str)}")
