<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="l_tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="l_warp" gradientUnits="userSpaceOnUse" x1="48" y1="26" x2="48" y2="98">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#7775D6"/>
    </linearGradient>
    <linearGradient id="l_weft" gradientUnits="userSpaceOnUse" x1="40" y1="86" x2="98" y2="86">
      <stop offset="0" stop-color="#7775D6"/>
      <stop offset="1" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="l_gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eac48e"/>
      <stop offset="1" stop-color="#c9a84c"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#l_tile)" stroke="#2a2f3a" stroke-width="1.5"/>
  <g fill="none" stroke-linecap="round">
    <!-- warp (vertical thread), overshoots the corner to imply interlace -->
    <path d="M48 26 V98" stroke="url(#l_warp)" stroke-width="13"/>
    <!-- weft (horizontal thread), overshoots left past the warp -->
    <path d="M40 86 H98" stroke="url(#l_weft)" stroke-width="13"/>
  </g>
  <!-- gold node at the crossing (echoes the soma nucleus) -->
  <circle cx="48" cy="86" r="8.5" fill="url(#l_gold)"/>
  <circle cx="48" cy="86" r="3" fill="#fff3da"/>
</svg>
