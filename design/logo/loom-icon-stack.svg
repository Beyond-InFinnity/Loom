<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="s_tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="s_gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eac48e"/>
      <stop offset="1" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="s_pa" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#9089fc"/>
    </linearGradient>
    <linearGradient id="s_pb" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9089fc"/>
      <stop offset="1" stop-color="#7775D6"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#s_tile)" stroke="#2a2f3a" stroke-width="1.5"/>
  <!-- warp threads: the weave texture -->
  <g stroke="#c9a84c" stroke-width="2" opacity="0.16">
    <line x1="46" y1="22" x2="46" y2="106"/>
    <line x1="64" y1="22" x2="64" y2="106"/>
    <line x1="82" y1="22" x2="82" y2="106"/>
  </g>
  <!-- weft: the four stacked layers (romanization / readings / target / native) -->
  <g>
    <rect x="42" y="28" width="44" height="12" rx="6" fill="url(#s_gold)"/>
    <rect x="32" y="48" width="64" height="12" rx="6" fill="url(#s_pa)"/>
    <rect x="36" y="68" width="52" height="12" rx="6" fill="url(#s_pb)"/>
    <rect x="28" y="88" width="72" height="12" rx="6" fill="url(#s_pb)"/>
  </g>
</svg>
