<!doctype html>
<html><head><meta charset="utf-8"><style>
  body{margin:0;font-family:'Segoe UI',Arial,sans-serif}
  .row{display:flex;align-items:center;gap:40px;padding:28px 36px;flex-wrap:wrap}
  .dark{background:#0d1117;color:#8b949e}
  .light{background:#f8f8f8;color:#57606a}
  h2{width:100%;margin:0 0 4px;font-size:13px;letter-spacing:2px;text-transform:uppercase;opacity:.7}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px;font-size:12px}
  img{display:block}
</style></head><body>

<div class="row dark"><h2>Concept 2 — stack icon (store / extension) · dark</h2>
  <div class="cell"><img src="loom-icon-stack.svg" width="128"><span>128</span></div>
  <div class="cell"><img src="loom-icon-stack.svg" width="64"><span>64</span></div>
  <div class="cell"><img src="loom-icon-stack.svg" width="32"><span>32</span></div>
  <div class="cell"><img src="loom-icon-stack.svg" width="16"><span>16</span></div>
</div>
<div class="row light"><h2>Concept 2 — stack icon · light</h2>
  <div class="cell"><img src="loom-icon-stack.svg" width="128"><span>128</span></div>
  <div class="cell"><img src="loom-icon-stack.svg" width="48"><span>48</span></div>
  <div class="cell"><img src="loom-icon-stack.svg" width="16"><span>16</span></div>
</div>

<div class="row dark"><h2>Concept 3 — "L" warp × weft icon · dark</h2>
  <div class="cell"><img src="loom-icon-L.svg" width="128"><span>128</span></div>
  <div class="cell"><img src="loom-icon-L.svg" width="64"><span>64</span></div>
  <div class="cell"><img src="loom-icon-L.svg" width="32"><span>32</span></div>
  <div class="cell"><img src="loom-icon-L.svg" width="16"><span>16</span></div>
</div>
<div class="row light"><h2>Concept 3 — "L" icon · light</h2>
  <div class="cell"><img src="loom-icon-L.svg" width="128"><span>128</span></div>
  <div class="cell"><img src="loom-icon-L.svg" width="48"><span>48</span></div>
  <div class="cell"><img src="loom-icon-L.svg" width="16"><span>16</span></div>
</div>

<div class="row dark"><h2>Concept 1 — woven logo lockup · dark</h2>
  <div class="cell"><img src="loom-logo-weave.svg" width="380"></div>
</div>
<div class="row light"><h2>Concept 1 — woven logo lockup · light</h2>
  <div class="cell"><img src="loom-logo-weave.svg" width="380"></div>
</div>

</body></html>
